<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Garlands Wholesale</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="topbar">
  <div class="container nav">
    <a class="logo" href="/">
      <img src="assets/logo.svg" alt="Garlands Wholesale" class="logo-img" />
      <span class="logo-text">Garlands Wholesale</span>
    </a>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/shop.html">Shop</a>
      <a href="/account.html">Account</a>
      <a href="/admin.html" class="active">Admin</a>
    </nav>
  </div>
</header>

<main class="container main">
  <section class="admin">
    <div class="admin-header">
      <h1>Admin</h1>
      <div class="admin-meta muted">Orders · Customers · Overview</div>
    </div>

    <div class="admin-toolbar">
      <select id="orderStatusFilter" onchange="renderOrders()">
        <option value="">All orders</option>
        <option value="new">New</option>
        <option value="confirmed">Confirmed</option>
        <option value="processing">Processing</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="btn" onclick="renderOrders()">Refresh orders</button>
      <button class="btn outline" onclick="renderCustomers()">Refresh customers</button>
    </div>

    <div class="admin-grid">
      <div>
        <h2>Orders</h2>
        <div id="adminOrders" class="admin-list">Loading...</div>
      </div>
      <div>
        <h2>Customers</h2>
        <div id="adminCustomers" class="admin-list">Loading...</div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container muted small">Admin preview — secure auth required before production.</div>
</footer>

<script>
async function loadJSON(url, options){
  const res = await fetch(url, options);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function escHtml(str){
  return String(str ?? "")
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtDate(v){
  if(!v) return '';
  try { return new Date(v).toLocaleString(); } catch { return v; }
}

function statusPill(status){
  const map = {
    new: 'pending',
    confirmed: 'success',
    processing: 'warn',
    delivered: 'success',
    cancelled: 'danger'
  };
  return `<span class="pill ${map[status] || 'pending'}">${escHtml(status || 'new')}</span>`;
}

async function renderOrders(){
  const status = document.getElementById('orderStatusFilter').value;
  const url = new URL('/api/admin/orders', location.origin);
  if (status) url.searchParams.set('status', status);
  const container = document.getElementById('adminOrders');
  container.innerHTML = 'Loading...';
  try {
    const rows = await loadJSON(url.toString());
    if (!rows.length){
      container.innerHTML = '<div class="empty-state">No orders match this filter.</div>';
      return;
    }
    container.innerHTML = rows.map(r => {
      let items = [];
      try { items = JSON.parse(r.items || '[]'); } catch {}
      const lines = items.map(i => `<div class="order-line"><span>${escHtml(i.name)}</span><span class="muted">x${i.qty}</span><span>$${(i.price * i.qty).toFixed(2)}</span></div>`).join('');
      return `
      <div class="admin-card">
        <div class="admin-card-header">
          <div><strong>#${r.id}</strong><div class="muted small">${fmtDate(r.created_at)}</div></div>
          <div class="admin-actions">
            <select onchange="updateOrderStatus(${r.id}, this.value)">
              <option value="">Set status</option>
              <option value="new">New</option>
              <option value="confirmed">Confirmed</option>
              <option value="processing">Processing</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="admin-card-body">
          <div><strong>${escHtml(r.name)}</strong><div class="muted small">${escHtml(r.whatsapp)}</div></div>
          <div class="muted">${escHtml(r.delivery)}</div>
          <div class="muted small">${escHtml(r.address)}</div>
          <div class="order-lines">${lines || '<div class="muted">No items</div>'}</div>
          <div><strong>Total:</strong> $${Number(r.total).toFixed(2)}</div>
        </div>
      </div>
      `;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Failed: ${escHtml(e.message)}</div>`;
  }
}

async function updateOrderStatus(id, status){
  if (!status) return;
  const url = `/api/admin/orders/${id}`;
  await fetch(url, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status})
  });
  renderOrders();
}

async function renderCustomers(){
  const container = document.getElementById('adminCustomers');
  container.innerHTML = 'Loading...';
  try {
    const rows = await loadJSON('/api/admin/customers');
    if (!rows.length){
      container.innerHTML = '<div class="empty-state">No customers yet.</div>';
      return;
    }
    container.innerHTML = rows.map(r => `
      <div class="admin-card">
        <div class="admin-card-header">
          <div><strong>${escHtml(r.name || 'Customer')}</strong><div class="muted small">${escHtml(r.business || '')}</div></div>
          <div class="muted small">${escHtml(r.whatsapp || '')}</div>
        </div>
        <div class="admin-card-body">
          <div class="muted small">${escHtml(r.email || '')}</div>
          <div class="muted small">${escHtml(r.address || '')}</div>
          <div class="muted small">Last order: ${fmtDate(r.last_order_at)}</div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Failed: ${escHtml(e.message)}</div>`;
  }
}

renderOrders();
renderCustomers();
</script>
</body>
</html>
